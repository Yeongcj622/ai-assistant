<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Assistant</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>My AI Assistant</h1>
        <div class="header-actions">
            <button id="settings-btn" class="btn-secondary">Settings</button>
            <button id="clear-btn" class="btn-secondary">Clear chat</button>
        </div>
    </header>

    <main>
        <div id="messages" class="messages"></div>

        <form id="chat-form" class="chat-form">
            <textarea id="chat-input" placeholder="Type a message…" rows="1"></textarea>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </main>

    <div id="settings-overlay" class="overlay hidden">
        <div class="settings-panel">
            <h2>Assistant settings</h2>
            <label for="system-prompt">Personality / instructions</label>
            <textarea id="system-prompt" rows="6" placeholder="e.g. You are a friendly, concise assistant who helps with daily planning."></textarea>
            <div class="settings-actions">
                <button id="settings-save" class="btn-primary">Save</button>
                <button id="settings-cancel" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
